# Supabase CLI config. `project_id` задайте командой
# `supabase link --project-ref <your-ref>` или впишите вручную.
project_id = "ivyuguhgmcudxebtevss"

[functions.sign]
# verify_jwt НАРОЧНО выключен. Gateway Supabase делает локальную HMAC-проверку
# JWT по legacy-секрету и ломается, если проект перешёл на новые JWT signing
# keys или ротировал секрет — выдаёт 401 ещё до запуска функции (в логах такие
# запросы видны с execution_id=null). Вместо этого функция сама вызывает
# supabaseClient.auth.getUser() внутри authenticate() — это честный запрос к
# Auth API, он подтверждает и подпись, и что пользователь всё ещё существует,
# и даёт нам user.id для RLS. Ни одного запроса без валидного токена функция
# не обслужит — см. supabase/functions/sign/index.ts:160.
verify_jwt = false
